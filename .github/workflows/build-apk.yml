name: Build Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
          if [ ! -s android.keystore ]; then
            echo "::error::android.keystore is empty â€” check that the ANDROID_KEYSTORE_BASE64 secret is set correctly"
            exit 1
          fi
          echo "Decoded keystore size: $(wc -c < android.keystore) bytes"
          echo "SHA-256 of decoded keystore: $(sha256sum android.keystore | cut -d' ' -f1)"

      - name: Verify keystore integrity
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if ! keytool -list -keystore android.keystore -storepass "$BUBBLEWRAP_KEYSTORE_PASSWORD" > /tmp/keytool_output.txt 2>&1; then
            echo "::error::android.keystore failed integrity check â€” the file is corrupted, truncated, or the store password is wrong."
            echo "This almost always means the ANDROID_KEYSTORE_BASE64 secret was copied incompletely."
            echo "----- keytool output -----"
            cat /tmp/keytool_output.txt
            echo "---------------------------"
            echo "Fix: regenerate the base64 with 'base64 -w0 salesapp.keystore > keystore.b64' and set the secret"
            echo "from the file directly (e.g. via 'gh secret set ANDROID_KEYSTORE_BASE64 < keystore.b64')"
            echo "rather than copy-pasting the string manually, to avoid truncation."
            exit 1
          fi
          echo "Keystore integrity verified. Entries found:"
          cat /tmp/keytool_output.txt

      - name: Configure Bubblewrap paths
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "Bubblewrap config written:"
          cat ~/.bubblewrap/config.json

      - name: Generate Android project from twa-manifest.json
        run: bubblewrap update --skipPwaValidation --appVersionName="1.0.${{ github.run_number }}"

      - name: Ensure INTERNET permission is present
        run: |
          set +e
          echo "Looking for AndroidManifest.xml ..."
          MANIFEST_PATH=$(find . -path ./node_modules -prune -o -name AndroidManifest.xml -print 2>/dev/null | grep "src/main/AndroidManifest.xml" | head -n 1)

          if [ -z "$MANIFEST_PATH" ]; then
            echo "::error::Could not locate an AndroidManifest.xml under src/main anywhere in the repo."
            echo "Directory listing for debugging:"
            find . -maxdepth 4 -type d
            exit 1
          fi

          echo "Using manifest: $MANIFEST_PATH"
          echo "----- BEFORE -----"
          cat "$MANIFEST_PATH"
          echo "-------------------"

          if grep -q "android.permission.INTERNET" "$MANIFEST_PATH"; then
            echo "INTERNET permission already present"
          else
            echo "INTERNET permission missing â€” patching manifest with Python"
            echo "" | base64 -d > /tmp/patch_manifest.py
            python3 /tmp/patch_manifest.py "$MANIFEST_PATH"
            PY_STATUS=$?
            if [ $PY_STATUS -ne 0 ]; then
              echo "::error::Python patch step failed with exit code $PY_STATUS"
              exit 1
            fi
          fi

          echo "----- AFTER -----"
          cat "$MANIFEST_PATH"
          echo "------------------"

          if grep -q "android.permission.INTERNET" "$MANIFEST_PATH"; then
            echo "Verified INTERNET permission is present:"
            grep "uses-permission" "$MANIFEST_PATH"
          else
            echo "::error::Failed to add INTERNET permission to $MANIFEST_PATH"
            exit 1
          fi

      - name: Build signed APK and AAB
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CadySalesApp-release
          path: |
            app-release-signed.apk
            app-release-bundle.aab
