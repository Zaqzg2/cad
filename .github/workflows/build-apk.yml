name: Build Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      - name: Configure Bubblewrap paths
        run: bubblewrap updateConfig --jdkPath="$JAVA_HOME" --androidSdkPath="$ANDROID_HOME"

      - name: Generate Android project from twa-manifest.json
        run: bubblewrap update --skipPwaValidation

      - name: Ensure INTERNET permission is present
        run: |
          MANIFEST_PATH="app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            if ! grep -q "android.permission.INTERNET" "$MANIFEST_PATH"; then
              echo "INTERNET permission missing — patching manifest"
              sed -i 's#<manifest[^>]*>#&\n    <uses-permission android:name="android.permission.INTERNET" />#' "$MANIFEST_PATH"
            else
              echo "INTERNET permission already present"
            fi
            grep "uses-permission" "$MANIFEST_PATH"
          else
            echo "WARNING: $MANIFEST_PATH not found, skipping patch"
          fi

      - name: Build signed APK and AAB
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CadySalesApp-release
          path: |
            app-release-signed.apk
            app-release-bundle.aab
